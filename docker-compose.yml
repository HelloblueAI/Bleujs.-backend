services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bleujs-ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AI_PORT:-8000}:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      PYTHONUNBUFFERED: 1
      MODEL_DIR: /app/models
    volumes:
      - ./models:/app/models:ro

  mongo:
    image: mongo:7.0
    container_name: bleujs-mongo
    restart: unless-stopped
    profiles:
      - mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?required}
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"

volumes:
  mongo_data:
    driver: local
