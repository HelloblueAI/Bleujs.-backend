# Dependabot — Bleu.js backend (Node API + Python ML)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Node.js (Express API)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    reviewers:
      - "HelloblueAI/backend-team"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    ignore:
      # ESLint 9+ requires flat config migration; stay on 8.x until migrated.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "patch"
      development-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"

  # Python (FastAPI / ML scripts)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "HelloblueAI/backend-team"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # mlflow>=3.13 requires pandas<3 (see requirements.txt). Allow 2.x patch/minor only.
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pandas"
        versions: [">=3.0.0"]
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
      api-dependencies:
        applies-to: version-updates
        patterns:
          - "fastapi*"
          - "uvicorn*"
        update-types:
          - "minor"
          - "patch"
      ml-dependencies:
        applies-to: version-updates
        patterns:
          - "xgboost*"
          - "scikit-learn*"
          - "pandas*"
          - "numpy*"
          - "joblib*"
          - "mlflow*"
          - "optuna*"
        update-types:
          - "minor"
          - "patch"
      python-other:
        applies-to: version-updates
        patterns:
          - "matplotlib*"
          - "seaborn*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-version:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-version:
        applies-to: version-updates
        patterns:
          - "*"
