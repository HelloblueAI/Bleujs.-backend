# CI for Bleu.js backend: lint, typecheck, smoke test
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # Ensure ML scripts and HF download path work (public repo, no token needed)
  ml-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-hf.txt
      - run: python scripts/download_model_from_hf.py
        env:
          HF_REPO_ID: pejmantheory/bleu-xgboost-classifier
      - run: test -f models/xgboost_model_latest.pkl && echo "Model present"
